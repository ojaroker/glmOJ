url: http://oscar.jaroker.com/glmOJ/

template:
  bootstrap: 5

home:
  title: "glmOJ — Count Regression Modeling"
  description: >
    An R package for fitting, diagnosing, and interpreting count and
    semi-continuous regression models: Poisson, quasi-Poisson, negative
    binomial, Tweedie, zero-inflated Poisson, zero-inflated negative
    binomial, and zero-inflated Tweedie.

navbar:
  structure:
    left:  [intro, reference, articles]
    right: [github]
  components:
    reference:
      text: Reference
      href: reference/index.html
    github:
      icon: fab fa-github
      href: https://github.com/ojaroker/glmOJ
      aria-label: GitHub

reference:
  - title: "Package"
    contents:
      - glmOJ-package

  - title: "Data Summarization"
    desc: >
      Explore count response variables numerically and graphically before
      fitting a model.
    contents:
      - summarizeCountData

  - title: "Model Fitting"
    desc: >
      Individual model fitters. Each returns exponentiated coefficients with
      95% Wald confidence intervals, randomized quantile residuals, a Pearson
      dispersion ratio, and a two-panel diagnostic plot.

  - subtitle: "Poisson"
    contents:
      - poissonGLM

  - subtitle: "Negative Binomial"
    contents:
      - negbinGLM

  - subtitle: "Zero-Inflated Poisson"
    contents:
      - zeroinflPoissonGLM

  - subtitle: "Zero-Inflated Negative Binomial"
    contents:
      - zeroinflNegbinGLM

  - subtitle: "Quasi-Poisson"
    contents:
      - quasiPoissonGLM

  - subtitle: "Tweedie"
    contents:
      - tweedieGLM

  - subtitle: "Zero-Inflated Tweedie"
    contents:
      - zeroinflTweedieGLM

  - title: "Model Selection"
    desc: >
      Fit all four model families and select the best by a user-chosen
      criterion (`decide`: `"BIC"` (default), `"AIC"`, `"LogLik"`, or
      `"McFadden"`), with plain-language diagnostics to guide interpretation.
    contents:
      - countGLM

  - title: "Generic Methods"
    desc: >
      S3 generics for all model classes. `predict()` and `fitted()` delegate
      to the underlying backend. `coef()` returns a named numeric vector of
      exponentiated coefficients. `coef_table()` returns the full table with
      95% Wald CIs, p-values, and significance stars. For `countGLM` objects
      all methods automatically use the selected best model.
    contents:
      - glmOJ-predict
      - glmOJ-fitted
      - glmOJ-coef
      - coef_table

  - title: "Interpretation"
    desc: >
      Natural-language interpretation of model coefficients and interactions.
    contents:
      - interpret_coef
      - untangle_interaction

  - title: "Datasets"
    desc: >
      Real and simulated datasets bundled with the package for use in
      examples and the vignette.
    contents:
      - Greenberg26.dat
      - Dahir25.dat
      - ZITweedie.dat
